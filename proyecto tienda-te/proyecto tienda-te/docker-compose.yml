services:
  mysql-inventario:
    image: mysql:8.0
    container_name: mysql-inventario
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: te_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_inventario_data:/var/lib/mysql

  mysql-ventas:
    image: mysql:8.0
    container_name: mysql-ventas
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: venta_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_ventas_data:/var/lib/mysql

  tienda-te-inventario:
    build:
      context: ./tienda-te-inventario
    container_name: tienda-te-inventario
    restart: always
    depends_on:
      - mysql-inventario
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-inventario:3306/te_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
    
  tienda-te-ventas:
    build:
      context: ./tienda-te-ventas
    container_name: tienda-te-ventas
    restart: always
    depends_on:
      - mysql-ventas
      - tienda-te-inventario
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-ventas:3306/venta_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      INVENTARIO_SERVICE_URL: http://tienda-te-inventario:8081

volumes:
  mysql_inventario_data:
  mysql_ventas_data: